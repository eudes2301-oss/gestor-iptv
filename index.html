<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor IPTV Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Fonte Inter e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-title: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-body);
            margin: 0;
            padding: 20px;
            padding-bottom: 90px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Topo Premium com Botões de Backup */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-md);
        }
        .header-title h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-body);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            background: var(--bg-card);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        /* Dashboard Otimizado */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .dash-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .dash-title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .dash-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-title);
        }

        /* Alertas */
        .alert-section {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-left: 5px solid var(--warning);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
            display: none;
            box-shadow: var(--shadow-sm);
        }
        .alert-section h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
            color: #b45309;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-list {
            margin: 0;
            padding-left: 0;
            list-style: none;
            color: #92400e;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .alert-list li {
            background: rgba(253, 230, 138, 0.4);
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Formulário Refinado */
        .form-section {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            margin-bottom: 35px;
        }
        .section-title {
            margin: 0 0 20px 0;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-title);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-body);
        }
        input {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: #f8fafc;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .full-width { grid-column: 1 / -1; }
        button.btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        button.btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.4);
        }

        /* GRID DE CARDS */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .client-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .client-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }
        .client-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-title);
            margin: 0;
            line-height: 1.2;
        }
        .badge {
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #b45309; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .info-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        
        .highlight-server .info-icon { background: #e0e7ff; color: #4338ca; }
        .highlight-server .info-text { font-weight: 600; color: #4338ca; background: #e0e7ff; padding: 4px 10px; border-radius: 6px; font-size: 13px;}
        
        .highlight-date .info-icon { background: #f3f4f6; color: var(--text-muted); }
        .highlight-date .info-text { font-weight: 700; font-size: 15px; color: var(--text-title); }
        .highlight-date.date-warning .info-icon { background: #fef3c7; color: #b45309; }
        .highlight-date.date-warning .info-text { color: #b45309; }
        .highlight-date.date-danger .info-icon { background: #fee2e2; color: #991b1b; }
        .highlight-date.date-danger .info-text { color: #991b1b; }

        .highlight-price .info-icon { background: #d1fae5; color: #059669; }
        .highlight-price .info-text { font-weight: 600; color: #059669; }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: auto;
        }
        .btn-card {
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-edit { background: #f1f5f9; color: var(--text-body); }
        .btn-edit:hover { background: #e2e8f0; color: var(--text-title); }
        .btn-delete { background: #fef2f2; color: #ef4444; }
        .btn-delete:hover { background: #fee2e2; color: #b91c1c; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #fff;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .header-container { flex-direction: column; align-items: flex-start; gap: 15px; }
            .header-actions { width: 100%; justify-content: flex-start; }
            form { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: 1fr; }
            .alert-list li { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Topo com os novos botões -->
        <div class="header-container">
            <div class="header-title">
                <div class="header-icon">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <h1>Gestor IPTV Pro</h1>
            </div>
            
            <div class="header-actions">
                <button class="btn-outline" onclick="exportarBackup()" title="Baixar dados para o aparelho">
                    <i class="fa-solid fa-download"></i> Salvar Backup
                </button>
                <button class="btn-outline" onclick="document.getElementById('fileBackup').click()" title="Restaurar dados de um arquivo">
                    <i class="fa-solid fa-upload"></i> Restaurar
                </button>
                <!-- O input de arquivo fica invisível e é ativado pelo botão Restaurar -->
                <input type="file" id="fileBackup" accept=".json" style="display: none;" onchange="importarBackup(event)">
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-card">
                <div class="dash-title">Total de Clientes</div>
                <div class="dash-value" id="dashTotal">0</div>
            </div>
            <div class="dash-card">
                <div class="dash-title">Vencendo em 7 dias</div>
                <div class="dash-value" id="dashVencendo" style="color: var(--warning);">0</div>
            </div>
            <div class="dash-card">
                <div class="dash-title">Receita Estimada</div>
                <div class="dash-value" id="dashReceita" style="color: var(--success);">R$ 0,00</div>
            </div>
        </div>

        <div id="alertSection" class="alert-section">
            <h3><i class="fa-solid fa-bell"></i> Atenção: Resumo de Vencimentos</h3>
            <ul id="alertList" class="alert-list"></ul>
        </div>

        <div class="form-section">
            <h2 class="section-title"><i class="fa-solid fa-user-plus"></i> Novo Cliente</h2>
            <form id="formCliente">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: Carlos Mendes" required>
                </div>
                <div class="form-group">
                    <label for="vencimento">Data de Vencimento</label>
                    <input type="date" id="vencimento" required>
                </div>
                <div class="form-group">
                    <label for="servidor">Servidor / Plano</label>
                    <input type="text" id="servidor" placeholder="Ex: Premium 4K" required>
                </div>
                <div class="form-group">
                    <label for="valor">Valor Mensal (R$)</label>
                    <input type="number" id="valor" step="0.01" min="0" placeholder="35.00" required>
                </div>
                
                <div class="form-group full-width">
                    <button type="submit" class="btn-submit" id="btnSalvar">
                        Salvar Cliente <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>

        <h2 class="section-title" style="margin-top: 40px; margin-bottom: 20px;">
            <i class="fa-solid fa-users"></i> Meus Clientes
        </h2>
        <div class="clients-grid" id="listaClientes">
            <!-- Cards injetados via JS -->
        </div>
    </div>

    <div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toastMsg">Sucesso!</span></div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('iptv_clientes')) || [];
        
        const formCliente = document.getElementById('formCliente');
        const listaClientes = document.getElementById('listaClientes');
        const btnSalvar = document.getElementById('btnSalvar');

        // FUNÇÕES DE BACKUP -----------------------------------------
        function exportarBackup() {
            if (clientes.length === 0) {
                mostrarToast('Não há clientes para fazer backup.');
                return;
            }
            // Transforma os dados em texto JSON e cria um arquivo virtual
            const dataStr = JSON.stringify(clientes);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            // Cria um link temporário e simula o clique para baixar
            const a = document.createElement('a');
            a.href = url;
            const dataAtual = new Date().toISOString().split('T')[0];
            a.download = `backup_iptv_${dataAtual}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            mostrarToast('Backup baixado com sucesso!');
        }

        function importarBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    // Verifica se o arquivo tem o formato correto
                    if (Array.isArray(importedData)) {
                        if(confirm('Atenção: Isso vai substituir a lista atual pelos dados do backup. Deseja continuar?')) {
                            clientes = importedData;
                            renderizarAplicacao();
                            mostrarToast('Backup restaurado com sucesso!');
                        }
                    } else {
                        mostrarToast('Arquivo de backup inválido.');
                    }
                } catch (error) {
                    mostrarToast('Erro ao ler o arquivo. Formato incorreto.');
                }
                // Limpa o input para poder importar o mesmo arquivo novamente se necessário
                event.target.value = '';
            };
            reader.readAsText(file);
        }
        // -----------------------------------------------------------

        function analisarVencimento(dataISO) {
            const [ano, mes, dia] = dataISO.split('-');
            const dataVenc = new Date(ano, mes - 1, dia);
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);

            const diferencaTempo = dataVenc.getTime() - hoje.getTime();
            const diasRestantes = Math.ceil(diferencaTempo / (1000 * 3600 * 24));

            let status = '';
            let classeBadge = '';
            let classeDate = '';
            let textoStatus = '';

            if (diasRestantes < 0) {
                status = 'vencido';
                classeBadge = 'badge-danger';
                classeDate = 'date-danger';
                textoStatus = 'Vencido';
            } else if (diasRestantes <= 7) {
                status = 'vencendo';
                classeBadge = 'badge-warning';
                classeDate = 'date-warning';
                textoStatus = diasRestantes === 0 ? 'Vence Hoje' : `Vence em ${diasRestantes} dias`;
            } else {
                status = 'ativo';
                classeBadge = 'badge-success';
                classeDate = '';
                textoStatus = 'Ativo';
            }

            return { diasRestantes, status, classeBadge, classeDate, textoStatus };
        }

        function formatarData(dataISO) {
            if (!dataISO) return '';
            const partes = dataISO.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function mostrarToast(mensagem) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = mensagem;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function atualizarDashboardEAlertas() {
            let receitaTotal = 0;
            let qtdVencendo = 0;
            const alertList = document.getElementById('alertList');
            const alertSection = document.getElementById('alertSection');
            alertList.innerHTML = '';

            clientes.forEach(cliente => {
                receitaTotal += parseFloat(cliente.valor || 0);
                
                const analise = analisarVencimento(cliente.vencimento);
                if (analise.status === 'vencido' || analise.status === 'vencendo') {
                    qtdVencendo++;
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span><strong>${cliente.nome}</strong> - ${cliente.servidor}</span>
                        <span class="badge ${analise.classeBadge}">${analise.textoStatus} (${formatarData(cliente.vencimento)})</span>
                    `;
                    alertList.appendChild(li);
                }
            });

            document.getElementById('dashTotal').textContent = clientes.length;
            document.getElementById('dashVencendo').textContent = qtdVencendo;
            document.getElementById('dashReceita').textContent = receitaTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            alertSection.style.display = qtdVencendo > 0 ? 'block' : 'none';
        }

        function renderizarAplicacao() {
            clientes.sort((a, b) => new Date(a.vencimento) - new Date(b.vencimento));
            listaClientes.innerHTML = '';

            if(clientes.length === 0) {
                listaClientes.innerHTML = '<p style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">Nenhum cliente cadastrado ainda.</p>';
            }

            clientes.forEach((cliente, index) => {
                const card = document.createElement('div');
                card.className = 'client-card';
                
                const valorFormatado = parseFloat(cliente.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                const analise = analisarVencimento(cliente.vencimento);

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="client-name">${cliente.nome}</h3>
                        <span class="badge ${analise.classeBadge}">${analise.textoStatus}</span>
                    </div>
                    
                    <div class="card-body">
                        <div class="info-row highlight-server">
                            <div class="info-icon"><i class="fa-solid fa-server"></i></div>
                            <span class="info-text">${cliente.servidor}</span>
                        </div>
                        
                        <div class="info-row highlight-date ${analise.classeDate}">
                            <div class="info-icon"><i class="fa-regular fa-calendar-check"></i></div>
                            <span class="info-text">${formatarData(cliente.vencimento)}</span>
                        </div>

                        <div class="info-row highlight-price">
                            <div class="info-icon"><i class="fa-solid fa-sack-dollar"></i></div>
                            <span class="info-text">${valorFormatado} / mês</span>
                        </div>
                    </div>

                    <div class="card-actions">
                        <button type="button" class="btn-card btn-edit" onclick="editarCliente(${index})">
                            <i class="fa-solid fa-pen-to-square"></i> Editar
                        </button>
                        <button type="button" class="btn-card btn-delete" onclick="excluirCliente(${index})">
                            <i class="fa-solid fa-trash-can"></i> Apagar
                        </button>
                    </div>
                `;
                listaClientes.appendChild(card);
            });

            atualizarDashboardEAlertas();
            localStorage.setItem('iptv_clientes', JSON.stringify(clientes));
        }

        formCliente.addEventListener('submit', function(e) {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const vencimento = document.getElementById('vencimento').value;
            const servidor = document.getElementById('servidor').value;
            const valor = document.getElementById('valor').value;
            const editIndex = document.getElementById('editIndex').value;

            const dadosCliente = { nome, vencimento, servidor, valor };

            if (editIndex === '-1') {
                clientes.push(dadosCliente);
                mostrarToast('Cliente adicionado!');
            } else {
                clientes[editIndex] = dadosCliente;
                document.getElementById('editIndex').value = '-1';
                btnSalvar.innerHTML = 'Salvar Cliente <i class="fa-solid fa-arrow-right"></i>';
                btnSalvar.style.backgroundColor = 'var(--primary)';
                document.querySelector('.section-title').innerHTML = '<i class="fa-solid fa-user-plus"></i> Novo Cliente';
                mostrarToast('Cadastro atualizado!');
            }

            renderizarAplicacao();
            formCliente.reset();
        });

        window.editarCliente = function(index) {
            const cliente = clientes[index];
            document.getElementById('nome').value = cliente.nome;
            document.getElementById('vencimento').value = cliente.vencimento;
            document.getElementById('servidor').value = cliente.servidor;
            document.getElementById('valor').value = cliente.valor;
            document.getElementById('editIndex').value = index;
            
            document.querySelector('.section-title').innerHTML = '<i class="fa-solid fa-user-pen"></i> Editando Cliente';
            btnSalvar.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Atualizar Dados';
            btnSalvar.style.backgroundColor = 'var(--warning)';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.excluirCliente = function(index) {
            if (confirm(`Deseja excluir o cliente ${clientes[index].nome}?`)) {
                clientes.splice(index, 1);
                renderizarAplicacao();
                mostrarToast('Cliente excluído.');
            }
        };

        renderizarAplicacao();

        if ('serviceWorker' in navigator) {
